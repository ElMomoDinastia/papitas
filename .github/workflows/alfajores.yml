name: X Video View Simulator

on:
  workflow_dispatch:

jobs:
  simulate-views:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        bot_id: [1, 2, 3, 4, 5] # Prueba con 5 para ver si las capturas salen bien antes de subir a 200
      max-parallel: 5
      fail-fast: false

    steps:
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Dependencies
        run: |
          npm init -y
          npm install playwright
          npx playwright install chromium --with-deps

      - name: Run Bot Script
        run: |
          node -e "
          const { chromium } = require('playwright');
          (async () => {
            const browser = await chromium.launch({ headless: true });
            const context = await browser.newContext({
              userAgent: 'Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/122.0.0.0 Safari/537.36',
              viewport: { width: 1280, height: 800 }
            });
            const page = await context.newPage();
            
            try {
              console.log('Bot ${{ matrix.bot_id }} disparando a post de video...');
              
              // Vamos al post
              await page.goto('https://x.com/jon1esi/status/2032516798776569901', { 
                waitUntil: 'domcontentloaded', 
                timeout: 40000 
              });

              // Esperamos un poco a que cargue el reproductor
              await page.waitForTimeout(5000);

              // Intentamos cerrar cualquier modal de 'Log in' que bloquee la vista
              try {
                const closeButton = await page.getByTestId('Layer_ShellHeader').locator('div').first();
                if (closeButton) await closeButton.click({ timeout: 2000 });
              } catch (e) {}

              // Intentamos darle Play al video (X suele usar data-testid='videoPlayer')
              console.log('Intentando activar video...');
              await page.mouse.click(640, 400); // Clic en el centro de la pantalla
              
              // Scroll para asegurar que el video esté 'en vista'
              await page.mouse.wheel(0, 300);
              
              // Esperamos 12 segundos para que la reproducción cuente (X pide >2 segs)
              await page.waitForTimeout(12000);

              // Sacamos captura para ver si se ve el video o el cartel de login
              await page.screenshot({ path: 'bot_${{ matrix.bot_id }}.png' });
              
              const title = await page.title();
              console.log('Finalizado. Título: ' + title);

            } catch (err) {
              console.log('Error en Bot ${{ matrix.bot_id }}: ' + err.message);
              await page.screenshot({ path: 'error_${{ matrix.bot_id }}.png' });
            } finally {
              await browser.close();
            }
          })();"

      - name: Upload Screenshot
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: screenshots-bot-${{ matrix.bot_id }}
          path: "*.png"
